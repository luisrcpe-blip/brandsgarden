<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Brandsgarden - Panel Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'DM Sans',sans-serif;background:#f0f4f0;display:flex;justify-content:center;align-items:center;min-height:100vh}
  .card{background:#fff;border-radius:20px;box-shadow:0 10px 40px rgba(0,0,0,.1);padding:48px 40px;width:100%;max-width:420px}
  .logo{text-align:center;margin-bottom:32px}
  .logo-icon{width:64px;height:64px;background:#e8f5e9;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;font-size:28px}
  h1{font-family:'Outfit',sans-serif;font-size:1.8rem;color:#1A472A;text-align:center;font-weight:800}
  p.sub{text-align:center;color:#888;margin-top:4px;font-size:.95rem}
  .group{margin-bottom:20px}
  label{display:block;font-weight:600;color:#374151;margin-bottom:6px;font-size:.9rem}
  input{width:100%;padding:13px 16px;border:2px solid #e5e7eb;border-radius:12px;font-size:1rem;font-family:'DM Sans',sans-serif;outline:none;transition:.2s}
  input:focus{border-color:#1A472A;box-shadow:0 0 0 3px rgba(26,71,42,.1)}
  .btn{width:100%;padding:15px;background:linear-gradient(135deg,#0C9145,#1A472A);color:#fff;border:none;border-radius:12px;font-size:1rem;font-weight:700;font-family:'DM Sans',sans-serif;cursor:pointer;transition:.2s;margin-top:8px}
  .btn:hover{transform:translateY(-2px);box-shadow:0 8px 20px rgba(12,145,69,.3)}
  .btn:active{transform:translateY(0)}
  .btn:disabled{opacity:.6;cursor:not-allowed;transform:none}
  .error{background:#fee2e2;color:#dc2626;padding:12px 16px;border-radius:10px;font-size:.9rem;margin-top:16px;display:none}
  .hint{text-align:center;color:#aaa;font-size:.8rem;margin-top:20px}
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-icon">🌿</div>
    <h1>Brandsgarden</h1>
    <p class="sub">Panel de Control Interno</p>
  </div>
  <form id="loginForm">
    <div class="group">
      <label>Correo electrónico</label>
      <input type="email" id="email" value="admin@brandsgarden.com" required autocomplete="email">
    </div>
    <div class="group">
      <label>Contraseña</label>
      <input type="password" id="password" placeholder="Tu contraseña" required autocomplete="current-password">
    </div>
    <button type="submit" class="btn" id="loginBtn">Acceder al Panel →</button>
    <div class="error" id="errorMsg"></div>
  </form>
  <p class="hint">Acceso restringido · Solo personal autorizado</p>
</div>
<script>
  document.getElementById('loginForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    const btn = document.getElementById('loginBtn');
    const err = document.getElementById('errorMsg');
    err.style.display = 'none';
    btn.disabled = true;
    btn.textContent = 'Verificando...';
    try {
      const res = await fetch('/api/login', {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({
          email: document.getElementById('email').value,
          password: document.getElementById('password').value
        })
      });
      const data = await res.json();
      if (data.ok) {
        window.location.href = data.redirect;
      } else {
        err.textContent = data.error || 'Error al iniciar sesión';
        err.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Acceder al Panel →';
      }
    } catch(e) {
      err.textContent = 'Error de conexión con el servidor';
      err.style.display = 'block';
      btn.disabled = false;
      btn.textContent = 'Acceder al Panel →';
    }
  });
</script>
</body>
</html>
