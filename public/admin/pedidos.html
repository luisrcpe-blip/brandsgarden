<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pedidos - Brandsgarden Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  :root{--green:#1A472A;--green-light:#e8f5e9;--text:#2d2d2d;--gray:#6b7280;--border:#e5e7eb;--bg:#f4f7f4}
  body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text)}
  /* MOBILE TOGGLE */
  .mobile-toggle { display: none; position: fixed; top: 50%; left: 0; transform: translateY(-50%); background: var(--green); color: #fff; border: none; padding: 0; width: 44px; height: 44px; border-radius: 0 8px 8px 0; box-shadow: 2px 0 8px rgba(0,0,0,.3); z-index: 200; cursor: pointer; font-size: 1.2rem; align-items: center; justify-content: center; }
  @media (max-width: 900px) { .mobile-toggle { display: flex; } #close-menu-btn { display: block !important; } }

  /* SIDEBAR */
  .sidebar-admin{position:fixed;top:0;left:0;height:100vh;width:220px;background:var(--green);display:flex;flex-direction:column;padding:24px 0;z-index:100}
  .sidebar-logo{padding:0 24px 24px;border-bottom:1px solid rgba(255,255,255,.1)}
  .sidebar-logo h2{font-family:'Outfit',sans-serif;color:#fff;font-size:1.3rem;font-weight:800}
  .sidebar-logo p{color:rgba(255,255,255,.6);font-size:.75rem;margin-top:2px}
  .nav-item{display:flex;align-items:center;gap:12px;padding:12px 24px;color:rgba(255,255,255,.75);text-decoration:none;font-weight:500;font-size:.95rem;transition:.2s;cursor:pointer;border:none;background:none;width:100%;text-align:left}
  .nav-item:hover,.nav-item.active{background:rgba(255,255,255,.1);color:#fff}
  .nav-item .icon{font-size:1.2rem;width:20px;text-align:center}
  .nav-bottom{margin-top:auto;border-top:1px solid rgba(255,255,255,.1);padding-top:8px}
  .main{margin-left:220px;padding:32px;min-height:100vh}
  .page-title{font-family:'Outfit',sans-serif;font-size:1.8rem;color:var(--green);font-weight:800;margin-bottom:32px}
  .section{background:#fff;border-radius:16px;padding:24px;box-shadow:0 2px 12px rgba(0,0,0,.06)}
  table{width:100%;border-collapse:collapse}
  th{text-align:left;font-size:.8rem;color:var(--gray);padding:12px;border-bottom:2px solid var(--border)}
  td{padding:12px;border-bottom:1px solid var(--border);font-size:.9rem}
  .custom-select {
    padding: 8px 32px 8px 12px;
    border-radius: 8px;
    border: 2px solid var(--border);
    font-family: 'DM Sans', sans-serif;
    outline: none;
    cursor: pointer;
    appearance: none;
    background-image: url("data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22292.4%22%20height%3D%22292.4%22%3E%3Cpath%20fill%3D%22%236b7280%22%20d%3D%22M287%2069.4a17.6%2017.6%200%200%200-13-5.4H18.4c-5%200-9.3%201.8-12.9%205.4A17.6%2017.6%200%200%200%200%2082.2c0%205%201.8%209.3%205.4%2012.9l128%20127.9c3.6%203.6%207.8%205.4%2012.8%205.4s9.2-1.8%2012.8-5.4L287%2095c3.5-3.5%205.4-7.8%205.4-12.8%200-5-1.9-9.2-5.5-12.8z%22%2F%3E%3C%2Fsvg%3E");
    background-repeat: no-repeat;
    background-position: right 12px top 50%;
    background-size: 10px auto;
    background-color: #fff;
    font-size: 0.9rem;
    transition: 0.2s;
  }
  .custom-select:hover { border-color: var(--green); }
  
  /* MODAL */
  .overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:none;align-items:center;justify-content:center}
  .overlay.open{display:flex}
  .modal{background:#fff;border-radius:20px;padding:32px;width:100%;max-width:500px;box-shadow:0 20px 50px rgba(0,0,0,.2); max-height:80vh; overflow-y:auto;}
</style>
</head>
<body>
<!-- SIDEBAR -->
<button class="mobile-toggle" id="mobile-toggle" onclick="document.getElementById('sidebar').classList.add('open'); this.style.display='none'">❯</button>
<aside class="sidebar-admin" id="sidebar">
  <div class="sidebar-logo" style="position:relative; padding-top:20px;">
    <button onclick="document.getElementById('sidebar').classList.remove('open'); document.getElementById('mobile-toggle').style.display='';" style="position:absolute;top:10px;right:-10px;background:none;border:none;color:#fff;font-size:1.6rem;cursor:pointer;display:none;padding:5px;z-index:10" id="close-menu-btn">✖</button>
    <div style="display:flex;align-items:center;">
      <h2>🌿 Brandsgarden</h2>
    </div>
    <p style="margin-top:8px">Panel Administrativo</p>
  </div>
  <a class="nav-item" href="/admin/dashboard"><span class="icon">📊</span>Resumen</a>
  <a class="nav-item active" href="/admin/pedidos"><span class="icon">🛒</span>Pedidos</a>
  <a class="nav-item" href="/admin/productos"><span class="icon">📦</span>Productos</a>
  <a class="nav-item" href="/admin/clientes"><span class="icon">👥</span>Usuarios</a>
  <a class="nav-item" href="/admin/configuracion"><span class="icon">⚙️</span>Configuración</a>
  <div class="nav-bottom">
    <a class="nav-item" href="/admin/logout"><span class="icon">🚪</span>Cerrar sesión</a>
  </div>
</aside>
<main class="main">
  <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 24px; flex-wrap:wrap; gap:16px;">
    <h1 class="page-title" style="margin-bottom:0;">Gestión de Pedidos</h1>
    <div style="display:flex; gap:10px; align-items:center;">
      <select id="bulk-action-select" class="custom-select" onchange="handleBulkAction(this.value); this.value=''">
        <option value="">Acciones en masa...</option>
        <option value="Completado">Marcar como Completado</option>
        <option value="Cancelado">Marcar como Cancelado</option>
        <option value="delete">🗑️ Eliminar seleccionados</option>
      </select>
    </div>
  </div>
  
  <div class="section">
    <div id="pedidos-container">
      <div class="loading">⏳ Cargando pedidos...</div>
    </div>
  </div>
</main>

<div class="overlay" id="pedido-modal" onclick="if(event.target===this) this.classList.remove('open')">
  <div class="modal">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;">
      <h3 id="modal-title" style="margin:0;font-family:'Outfit',sans-serif;color:var(--green);font-size:1.3rem;font-weight:800;">Detalles del Pedido</h3>
      <button onclick="document.getElementById('pedido-modal').classList.remove('open')" style="background:none;border:none;font-size:1.5rem;cursor:pointer;color:var(--gray)">✖</button>
    </div>
    <div id="modal-body"></div>
  </div>
</div>

<script>
  if(window.innerWidth <= 900) { 
    const toggle = document.getElementById('mobile-toggle');
    if(toggle) toggle.style.display = 'flex'; 
    const closeBtn = document.getElementById('close-menu-btn');
    if(closeBtn) closeBtn.style.display = 'block';
  }

  let pedidos = [];

  async function load(){
    try {
      const res = await fetch('/api/pedidos');
      if (res.status === 401) { window.location.href = '/admin'; return; }
      pedidos = await res.json();
      renderTabla();
    } catch(e) {
      document.getElementById('pedidos-container').innerHTML = '<div class="loading" style="color:red">Error cargando pedidos</div>';
    }
  }

  function renderTabla() {
    const container = document.getElementById('pedidos-container');
    if(pedidos.length === 0) {
      container.innerHTML = '<div class="loading">📭 Aún no hay pedidos.</div>';
      return;
    }

    const rows = pedidos.map(p => `
      <tr style="transition:0.2s">
        <td style="width: 40px; text-align:center;">
          <input type="checkbox" class="pedido-chk" value="${p.id}" onchange="toggleRow(this)">
        </td>
        <td><strong style="color:var(--green)">BG-${p.id}</strong></td>
        <td>
          <div style="font-weight:600">${p.cliente}</div>
          <div style="font-size:0.8rem; color:var(--gray)">${p.telefono} | ${p.distrito || ''}</div>
        </td>
        <td style="font-weight:700; color:var(--text)">S/ ${(parseFloat(p.total) || 0).toFixed(2)}</td>
        <td>
          <select class="custom-select" onchange="update(${p.id}, this.value)">
            <option value="Preparando" ${p.estado==='Preparando'?'selected':''}>Preparando</option>
            <option value="En camino" ${p.estado==='En camino'?'selected':''}>En camino</option>
            <option value="Entregado" ${p.estado==='Entregado'?'selected':''}>Entregado</option>
            <option value="Completado" ${p.estado==='Completado'?'selected':''}>Completado</option>
            <option value="Cancelado" ${p.estado==='Cancelado'?'selected':''}>Cancelado</option>
          </select>
        </td>
        <td style="color:var(--gray); font-size:0.85rem;">
          ${p.fecha_creacion ? new Date(p.fecha_creacion).toLocaleDateString() : '---'}
        </td>
        <td>
          <button onclick="verDetallePedido(${p.id})" style="background:var(--green-light);color:var(--green);border:none;padding:6px 12px;border-radius:8px;cursor:pointer;font-weight:700;font-family:'DM Sans',sans-serif;">👁️ Ver</button>
        </td>
      </tr>
    `).join('');

    container.innerHTML = `
      <div style="overflow-x:auto;">
        <table style="width:100%; border-collapse:collapse;">
          <thead>
            <tr>
              <th style="width: 40px; text-align:center; padding:12px; border-bottom:2px solid var(--border);"><input type="checkbox" id="chk-all" onchange="toggleAll(this)"></th>
              <th style="text-align:left; font-size:0.8rem; color:var(--gray); padding:12px; border-bottom:2px solid var(--border);">Pedido</th>
              <th style="text-align:left; font-size:0.8rem; color:var(--gray); padding:12px; border-bottom:2px solid var(--border);">Info Cliente</th>
              <th style="text-align:left; font-size:0.8rem; color:var(--gray); padding:12px; border-bottom:2px solid var(--border);">Total</th>
              <th style="text-align:left; font-size:0.8rem; color:var(--gray); padding:12px; border-bottom:2px solid var(--border);">Estado</th>
              <th style="text-align:left; font-size:0.8rem; color:var(--gray); padding:12px; border-bottom:2px solid var(--border);">Fecha</th>
              <th style="text-align:left; font-size:0.8rem; color:var(--gray); padding:12px; border-bottom:2px solid var(--border);">Acciones</th>
            </tr>
          </thead>
          <tbody>${rows}</tbody>
        </table>
      </div>
    `;
  }

  function toggleAll(src) {
    const checkboxes = document.querySelectorAll('.pedido-chk');
    checkboxes.forEach(chk => {
      chk.checked = src.checked;
      chk.closest('tr').style.backgroundColor = src.checked ? 'var(--green-light)' : '';
    });
  }

  function toggleRow(chk) {
    chk.closest('tr').style.backgroundColor = chk.checked ? 'var(--green-light)' : '';
    const all = document.querySelectorAll('.pedido-chk');
    const allChecked = Array.from(all).every(c => c.checked);
    document.getElementById('chk-all').checked = allChecked;
  }

  function getSelected() {
    const chks = document.querySelectorAll('.pedido-chk:checked');
    return Array.from(chks).map(c => parseInt(c.value));
  }

  async function update(id, pos){
    await fetch('/api/pedidos/' + id + '/estado', { 
      method:'PUT', 
      headers:{'Content-Type':'application/json'}, 
      body:JSON.stringify({estado:pos}) 
    });
  }

  function handleBulkAction(action) {
    if(!action) return;
    if(action === 'delete') {
      bulkDelete();
    } else {
      bulkAction(action);
    }
  }

  async function bulkAction(estado) {
    const ids = getSelected();
    if(ids.length === 0) return alert('Selecciona al menos un pedido.');
    if(!confirm('¿Seguro que deseas cambiar ' + ids.length + ' pedidos a ' + estado + '?')) return;

    try {
      const res = await fetch('/api/pedidos/bulk', {
        method: 'PUT',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ ids, estado })
      });
      if(res.ok) load();
      else alert('Hubo un error');
    } catch(e) { alert('Error de conexión'); }
  }

  async function bulkDelete() {
    const ids = getSelected();
    if(ids.length === 0) return alert('Selecciona al menos un pedido.');
    if(!confirm('🚨 ATENCIÓN: El sistema no te dejará eliminar un pedido que no sea el último para no dañar el historial de ventas o el conteo.\n¿Intentar de todas formas con los seleccionados?')) return;

    let errores = 0;
    // Debemos borrar en orden de mayor ID al menor para que el servidor permita la purga sin dar error de "antiguo".
    ids.sort((a,b) => b - a);

    for(const id of ids) {
      try {
        const res = await fetch('/api/pedidos/' + id, { method: 'DELETE' });
        if(!res.ok) {
           const err = await res.json();
           alert("BG-" + id + ": " + err.error);
           errores++;
           break; // Stop immediately 
        }
      } catch(e) {}
    }
    if(errores === 0) alert('Pedidos eliminados con éxito.');
    // Recargar SI O SI para reflejar lo que sí se borró
    load();
  }

  function verDetallePedido(id) {
    const p = pedidos.find(x => x.id === id);
    if (!p) return;
    
    document.getElementById('modal-title').textContent = `Pedido BG-${p.id}`;
    let itemsHtml = (p.productos || []).map(i => `
      <div style="display:flex; justify-content:space-between; margin-bottom:10px; padding-bottom:10px; border-bottom:1px solid #eee;">
        <div><strong>${i.cantidad}x</strong> ${i.nombre}</div>
        <div>S/ ${(parseFloat(i.precio) * i.cantidad).toFixed(2)}</div>
      </div>
    `).join('');
    if(!itemsHtml) itemsHtml = '<div style="color:var(--gray);font-style:italic">No hay items en el pedido.</div>';
    
    document.getElementById('modal-body').innerHTML = `
      <div style="display:grid; grid-template-columns:1fr 1fr; gap:20px; margin-bottom:20px;">
        <div>
          <p style="color:var(--gray); font-size:0.85rem; margin-bottom:5px;">Cliente</p>
          <p style="font-weight:600;">${p.cliente}</p>
          <p>${p.telefono}</p>
          <p>${p.email || 'Sin email'}</p>
        </div>
        <div>
          <p style="color:var(--gray); font-size:0.85rem; margin-bottom:5px;">Entrega</p>
          <p>${p.direccion || '---'}</p>
          <p>${p.distrito || ''} ${p.departamento ? ' - ' + p.departamento : ''}</p>
        </div>
      </div>
      <h4 style="margin-bottom:15px; color:var(--green);">Productos</h4>
      ${itemsHtml}
      <div style="display:flex; justify-content:space-between; margin-top:15px; font-size:1.1rem; font-weight:800;">
        <div>TOTAL A PAGAR:</div>
        <div style="color:var(--green)">S/ ${(parseFloat(p.total) || 0).toFixed(2)}</div>
      </div>
    `;
    
    document.getElementById('pedido-modal').classList.add('open');
  }

  load();
</script>
</body>
</html>
