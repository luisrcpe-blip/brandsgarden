<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Productos - Brandsgarden Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  :root{--green:#1A472A;--green-light:#e8f5e9;--text:#2d2d2d;--gray:#6b7280;--border:#e5e7eb;--bg:#f4f7f4}
  body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text)}
  .sidebar{position:fixed;top:0;left:0;height:100vh;width:220px;background:var(--green);display:flex;flex-direction:column;padding:24px 0;z-index:100}
  .sidebar-logo{padding:24px;border-bottom:1px solid rgba(255,255,255,.1)}
  .sidebar-logo h2{color:#fff;font-family:'Outfit'}
  .nav-item{display:flex;align-items:center;gap:12px;padding:12px 24px;color:rgba(255,255,255,.75);text-decoration:none}
  .nav-item.active{background:rgba(255,255,255,.1);color:#fff}
  .main{margin-left:220px;padding:32px}
  .page-header{display:flex;justify-content:space-between;margin-bottom:32px}
  .section{background:#fff;border-radius:16px;padding:24px;box-shadow:0 2px 12px rgba(0,0,0,.06)}
  table{width:100%;border-collapse:collapse}
  th{text-align:left;padding:12px;border-bottom:2px solid var(--border)}
  td{padding:12px;border-bottom:1px solid var(--border)}
  .btn{padding:8px 16px;border-radius:8px;border:none;cursor:pointer;font-weight:600}
  .btn-add{background:var(--green);color:#fff}
</style>
</head>
<body>
<aside class="sidebar">
  <div class="sidebar-logo"><h2>🌿 Brandsgarden</h2></div>
  <a class="nav-item" href="/admin/dashboard">📊 Resumen</a>
  <a class="nav-item" href="/admin/pedidos">🛒 Pedidos</a>
  <a class="nav-item active" href="/admin/productos">📦 Productos</a>
  <a class="nav-item" href="/admin/clientes">👥 Clientes</a>
  <a class="nav-item" href="/admin/configuracion">⚙️ Configuración</a>
  <div class="nav-bottom"><a class="nav-item" href="/admin/logout">🚪 Cerrar sesión</a></div>
</aside>
<main class="main">
  <div class="page-header"><h1>Gestión de Productos</h1><button class="btn btn-add" onclick="alert('Se abrirá modal de nuevo producto')">+ Nuevo</button></div>
  <div class="section">
    <table>
      <thead><tr><th>Nombre</th><th>Categoría</th><th>Precio</th><th>Stock</th></tr></thead>
      <tbody id="prod-body"></tbody>
    </table>
  </div>
</main>
<script>
  async function load(){
    const res = await fetch('/api/productos');
    const data = await res.json();
    document.getElementById('prod-body').innerHTML = data.map(p=>`
      <tr>
        <td><strong>${p.nombre}</strong></td>
        <td>${p.categoria}</td>
        <td>S/ ${p.precio.toFixed(2)}</td>
        <td>${p.stock}</td>
      </tr>
    `).join('');
  }
  load();
</script>
</body>
</html>
