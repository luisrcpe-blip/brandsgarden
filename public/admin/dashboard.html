<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard - Brandsgarden Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  :root{--green:#1A472A;--green-light:#e8f5e9;--green-mid:#0C9145;--text:#2d2d2d;--gray:#6b7280;--border:#e5e7eb;--bg:#f4f7f4}
  body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text)}
  .sidebar{position:fixed;top:0;left:0;height:100vh;width:220px;background:var(--green);display:flex;flex-direction:column;padding:24px 0;z-index:100}
  .sidebar-logo{padding:0 24px 24px;border-bottom:1px solid rgba(255,255,255,.1)}
  .sidebar-logo h2{font-family:'Outfit',sans-serif;color:#fff;font-size:1.3rem;font-weight:800}
  .nav-item{display:flex;align-items:center;gap:12px;padding:12px 24px;color:rgba(255,255,255,.75);text-decoration:none;font-weight:500;font-size:.95rem;transition:.2s}
  .nav-item:hover,.nav-item.active{background:rgba(255,255,255,.1);color:#fff}
  .nav-bottom{margin-top:auto;border-top:1px solid rgba(255,255,255,.1);padding-top:8px}
  .main{margin-left:220px;padding:32px;min-height:100vh}
  .page-title{font-family:'Outfit',sans-serif;font-size:1.8rem;color:var(--green);font-weight:800;margin-bottom:32px}
  .cards{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;margin-bottom:32px}
  .card{background:#fff;border-radius:16px;padding:24px;box-shadow:0 2px 12px rgba(0,0,0,.06)}
  .card-label{color:var(--gray);font-size:.85rem;font-weight:500}
  .card-value{font-family:'Outfit',sans-serif;font-size:2rem;font-weight:800;color:var(--green);margin:4px 0}
  @media (max-width: 900px) { .sidebar { display:none } .main { margin-left:0 } }
</style>
</head>
<body>
<aside class="sidebar">
  <div class="sidebar-logo"><h2>🌿 Brandsgarden</h2><p style="color:#fff;font-size:.7rem">Admin Panel</p></div>
  <a class="nav-item active" href="/admin/dashboard">📊 Resumen</a>
  <a class="nav-item" href="/admin/pedidos">🛒 Pedidos</a>
  <a class="nav-item" href="/admin/productos">📦 Productos</a>
  <a class="nav-item" href="/admin/clientes">👥 Clientes</a>
  <a class="nav-item" href="/admin/configuracion">⚙️ Configuración</a>
  <div class="nav-bottom"><a class="nav-item" href="/admin/logout">🚪 Cerrar sesión</a></div>
</aside>
<main class="main">
  <h1 class="page-title">Panel de Resumen</h1>
  <div class="cards">
    <div class="card"><div class="card-label">Ventas de hoy</div><div class="card-value" id="v-hoy">S/ 0</div></div>
    <div class="card"><div class="card-label">Pedidos pendientes</div><div class="card-value" id="p-pen">0</div></div>
    <div class="card"><div class="card-label">Total Productos</div><div class="card-value" id="t-prod">0</div></div>
  </div>
</main>
<script>
  async function load(){
    const [ped, prod] = await Promise.all([fetch('/api/pedidos').then(r=>r.json()), fetch('/api/productos').then(r=>r.json())]);
    document.getElementById('t-prod').textContent = prod.length;
    document.getElementById('p-pen').textContent = ped.filter(p=>p.estado!=='Entregado').length;
    const hoy = new Date().toISOString().split('T')[0];
    const v = ped.filter(p=>p.fecha===hoy).reduce((s,p)=>s+p.total,0);
    document.getElementById('v-hoy').textContent = `S/ ${v.toFixed(2)}`;
  }
  load();
</script>
</body>
</html>
