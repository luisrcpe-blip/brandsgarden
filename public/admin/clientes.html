<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clientes - Brandsgarden Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  :root{--green:#1A472A;--green-light:#e8f5e9;--green-mid:#0C9145;--text:#2d2d2d;--gray:#6b7280;--border:#e5e7eb;--bg:#f4f7f4}
  body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text)}
  
  /* SIDEBAR */
  .sidebar-admin{position:fixed;top:0;left:0;height:100vh;width:220px;background:var(--green);display:flex;flex-direction:column;padding:24px 0;z-index:100;transition:transform 0.3s}
  .sidebar-logo{padding:0 24px 24px;border-bottom:1px solid rgba(255,255,255,.1)}
  .sidebar-logo h2{font-family:'Outfit',sans-serif;color:#fff;font-size:1.3rem;font-weight:800}
  .sidebar-logo p{color:rgba(255,255,255,.6);font-size:.75rem;margin-top:2px}
  .nav-item{display:flex;align-items:center;gap:12px;padding:12px 24px;color:rgba(255,255,255,.75);text-decoration:none;font-weight:500;font-size:.95rem;transition:.2s;cursor:pointer;border:none;background:none;width:100%;text-align:left}
  .nav-item:hover,.nav-item.active{background:rgba(255,255,255,.1);color:#fff}
  .nav-item .icon{font-size:1.2rem;width:20px;text-align:center}
  .nav-bottom{margin-top:auto;border-top:1px solid rgba(255,255,255,.1);padding-top:8px}

  /* MAIN */
  .main{margin-left:220px;padding:32px;min-height:100vh}
  .page-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:32px}
  .page-title{font-family:'Outfit',sans-serif;font-size:1.8rem;color:var(--green);font-weight:800}
  
  /* TABLE */
  .section{background:#fff;border-radius:16px;padding:24px;box-shadow:0 2px 12px rgba(0,0,0,.06)}
  table{width:100%;border-collapse:collapse}
  th{text-align:left;font-size:.8rem;font-weight:700;color:var(--gray);text-transform:uppercase;letter-spacing:.5px;padding:0 12px 12px;border-bottom:2px solid var(--border)}
  td{padding:14px 12px;border-bottom:1px solid var(--border);font-size:.9rem;vertical-align:middle}
  tr:last-child td{border-bottom:none}
  .loading{text-align:center;color:var(--gray);padding:40px}
  
  /* CLIENT CARD STATS */
  .badge-gastado{background:#d1fae5;color:#065f46;padding:4px 10px;border-radius:8px;font-weight:700;}
  .badge-pedidos{background:#f3f4f6;color:#374151;padding:4px 10px;border-radius:8px;font-weight:700;}

  /* MOBILE TOGGLE */
  .mobile-toggle { display: none; position: fixed; top: 50%; left: 0; transform: translateY(-50%); background: var(--green); color: #fff; border: none; padding: 0; width: 44px; height: 44px; border-radius: 0 8px 8px 0; box-shadow: 2px 0 8px rgba(0,0,0,.3); z-index: 200; cursor: pointer; font-size: 1.2rem; align-items: center; justify-content: center; }
  @media (max-width: 900px) { .mobile-toggle { display: flex; } #close-menu-btn { display: block !important; } }

  /* RESPONSIVE */
  @media (max-width: 900px) {
    .sidebar-admin { transform: translateX(-100%); width: 260px; z-index: 300 }
    .sidebar-admin.open { transform: translateX(0) }
    .main { margin-left: 0; padding: 20px }
    .table-container { overflow-x: auto }
    table { min-width: 600px }
  }
</style>
</head>
<body>

<!-- SIDEBAR -->
<button class="mobile-toggle" id="mobile-toggle" onclick="document.getElementById('sidebar').classList.add('open'); this.style.display='none'">❯</button>
<aside class="sidebar-admin" id="sidebar">
  <div class="sidebar-logo" style="position:relative; padding-top:20px;">
    <button onclick="document.getElementById('sidebar').classList.remove('open'); document.getElementById('mobile-toggle').style.display='';" style="position:absolute;top:10px;right:-10px;background:none;border:none;color:#fff;font-size:1.6rem;cursor:pointer;display:none;padding:5px;z-index:10" id="close-menu-btn">✖</button>
    <div style="display:flex;align-items:center;">
      <h2>🌿 Brandsgarden</h2>
    </div>
    <p style="margin-top:8px">Panel Administrativo</p>
  </div>
  <a class="nav-item" href="/admin/dashboard"><span class="icon">📊</span>Resumen</a>
  <a class="nav-item" href="/admin/pedidos"><span class="icon">🛒</span>Pedidos</a>
  <a class="nav-item" href="/admin/productos"><span class="icon">📦</span>Productos</a>
  <a class="nav-item active" href="/admin/clientes"><span class="icon">👥</span>Usuarios</a>
  <a class="nav-item" href="/admin/configuracion"><span class="icon">⚙️</span>Configuración</a>
  <div class="nav-bottom">
    <a class="nav-item" href="/admin/logout"><span class="icon">🚪</span>Cerrar sesión</a>
  </div>
</aside>

<!-- MAIN -->
<main class="main">
  <div class="page-header">
    <div style="display:flex;align-items:center;gap:16px">
      <button onclick="document.getElementById('sidebar').classList.add('open')" style="display:none;background:none;border:none;font-size:1.5rem;cursor:pointer" id="menu-btn">☰</button>
      <div>
        <h1 class="page-title">Directorio de Usuarios</h1>
        <p style="color:var(--gray);font-size:0.9rem;margin-top:4px;">Gestiona el acceso y roles de los usuarios</p>
      </div>
    </div>
    <div style="display:flex; gap:12px; align-items:center;">
      <button onclick="openModal()" style="background:linear-gradient(135deg,#0C9145,#1A472A);color:#fff;border:none;border-radius:12px;padding:12px 22px;font-size:.95rem;font-weight:700;font-family:'DM Sans',sans-serif;cursor:pointer;transition:.2s">+ Nuevo</button>
    </div>
  </div>

  <div class="section">
    <div id="clientes-container"><div class="loading">⏳ Cargando usuarios...</div></div>
  </div>
</main>

<!-- MODAL -->
<div class="overlay" id="overlay" onclick="closeModalOutside(event)" style="position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:none;align-items:center;justify-content:center">
  <div class="modal" style="background:#fff;border-radius:20px;padding:32px;width:100%;max-width:400px;box-shadow:0 20px 50px rgba(0,0,0,.2)">
    <h3 id="modal-title" style="font-family:'Outfit',sans-serif;color:var(--green);font-size:1.3rem;font-weight:800;margin-bottom:20px">Nuevo Usuario</h3>
    <div class="form-group" style="margin-bottom:16px">
      <label style="display:block;font-weight:600;font-size:.85rem;color:#374151;margin-bottom:5px">Correo Electrónico</label>
      <input type="email" id="f-email" placeholder="Ej: admin@tienda.com" style="width:100%;padding:11px 14px;border:2px solid var(--border);border-radius:10px;font-size:.95rem;font-family:'DM Sans',sans-serif;outline:none">
    </div>
    <div class="form-group" style="margin-bottom:16px">
      <label style="display:block;font-weight:600;font-size:.85rem;color:#374151;margin-bottom:5px">Contraseña</label>
      <input type="password" id="f-password" placeholder="Mínimo 6 caracteres" style="width:100%;padding:11px 14px;border:2px solid var(--border);border-radius:10px;font-size:.95rem;font-family:'DM Sans',sans-serif;outline:none">
    </div>
    <div class="form-group" style="margin-bottom:16px">
      <label style="display:block;font-weight:600;font-size:.85rem;color:#374151;margin-bottom:5px">Rol</label>
      <select id="f-rol" style="width:100%;padding:11px 14px;border:2px solid var(--border);border-radius:10px;font-size:.95rem;font-family:'DM Sans',sans-serif;outline:none">
        <option value="administrador">Administrador</option>
        <option value="cliente">Cliente</option>
      </select>
    </div>
    <div class="modal-btns" style="display:flex;gap:10px;margin-top:20px">
      <button class="btn-cancel" onclick="closeModal()" style="flex:1;padding:12px;background:#f3f4f6;color:#374151;border:none;border-radius:10px;font-weight:700;font-family:'DM Sans',sans-serif;cursor:pointer;font-size:.95rem">Cancelar</button>
      <button class="btn-save" onclick="guardarUsuario()" style="flex:1;padding:12px;background:linear-gradient(135deg,#0C9145,#1A472A);color:#fff;border:none;border-radius:10px;font-weight:700;font-family:'DM Sans',sans-serif;cursor:pointer;font-size:.95rem">Guardar ✓</button>
    </div>
  </div>
</div>

<script>
  if(window.innerWidth <= 900) { 
    document.getElementById('menu-btn').style.display = 'block'; 
    if(document.getElementById('close-menu-btn')) document.getElementById('close-menu-btn').style.display = 'block';
  }

  async function cargarUsuarios() {
    try {
      const res = await fetch('/api/usuarios');
      if (res.status === 401) { window.location.href = '/admin'; return; }
      
      const usuarios = await res.json();
      const container = document.getElementById('clientes-container');
      
      if (usuarios.length === 0) {
        container.innerHTML = '<div class="loading">📭 Aún no hay usuarios registrados.</div>';
        return;
      }

      const rows = usuarios.map(u => `
        <tr>
          <td>
            <strong>${u.email}</strong>
          </td>
          <td><span class="${u.is_admin ? 'badge-gastado' : 'badge-pedidos'}">${u.is_admin ? 'Administrador' : 'Cliente'}</span></td>
          <td>
            <button onclick="eliminarUsuario(${u.id})" style="padding:6px 14px;border-radius:8px;font-size:.8rem;font-weight:600;cursor:pointer;border:none;font-family:'DM Sans',sans-serif;background:#fee2e2;color:#dc2626;transition:.2s">🗑️ Eliminar</button>
          </td>
        </tr>
      `).join('');
      
      container.innerHTML = `<div class="table-container"><table>
        <thead><tr><th>Correo Electrónico</th><th>Rol</th><th>Acciones</th></tr></thead>
        <tbody>${rows}</tbody>
      </table></div>`;
    } catch(err) {
      document.getElementById('clientes-container').innerHTML = '<div class="loading" style="color:red">Error al cargar usuarios</div>';
    }
  }

  function openModal() {
    document.getElementById('f-email').value = '';
    document.getElementById('f-password').value = '';
    document.getElementById('f-rol').value = 'cliente';
    document.getElementById('overlay').style.display = 'flex';
  }

  function closeModal() {
    document.getElementById('overlay').style.display = 'none';
  }

  function closeModalOutside(e) {
    if(e.target === document.getElementById('overlay')) closeModal();
  }

  async function guardarUsuario() {
    const email = document.getElementById('f-email').value;
    const password = document.getElementById('f-password').value;
    const rol = document.getElementById('f-rol').value;
    
    if (!email || !password) return alert('Completa todos los campos');

    const res = await fetch('/api/usuarios', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password, rol })
    });
    
    if (res.ok) {
      closeModal();
      cargarUsuarios();
    } else {
      const err = await res.json();
      alert(err.error || 'Error al guardar');
    }
  }

  async function eliminarUsuario(id) {
    if (!confirm('¿Seguro que deseas eliminar este usuario?')) return;
    await fetch('/api/usuarios/' + id, { method: 'DELETE' });
    cargarUsuarios();
  }

  cargarUsuarios();
</script>
</body>
</html>
