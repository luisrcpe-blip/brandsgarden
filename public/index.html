<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brandsgarden | En Construcción</title>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #1A472A; /* Forest Green */
            --accent: #0C9145; /* Vibrant Green */
            --white: #ffffff;
            --cream: #f4f6f4;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background-color: var(--primary);
            color: var(--white);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            text-align: center;
        }

        /* Animated Background Pattern */
        body::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(12, 145, 69, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(12, 145, 69, 0.1) 0%, transparent 50%);
            z-index: -1;
        }

        .container {
            max-width: 600px;
            padding: 40px;
            z-index: 1;
        }

        .logo-wrapper {
            margin-bottom: 40px;
            animation: fadeInDown 1s ease-out;
        }

        .logo-icon {
            font-size: 60px;
            margin-bottom: 20px;
            display: inline-block;
            filter: drop-shadow(0 0 20px rgba(12, 145, 69, 0.5));
            animation: float 3s ease-in-out infinite;
        }

        h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 3.5rem;
            font-weight: 800;
            margin-bottom: 16px;
            letter-spacing: -1px;
            line-height: 1.1;
        }

        p {
            font-size: 1.2rem;
            color: rgba(255, 255, 255, 0.8);
            margin-bottom: 40px;
            line-height: 1.6;
        }

        .btn-luxury {
            display: inline-block;
            background: linear-gradient(135deg, var(--accent), #14532d);
            color: var(--white);
            padding: 18px 40px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 700;
            font-size: 1.1rem;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 30px rgba(12, 145, 69, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .btn-luxury:hover {
            transform: translateY(-5px) scale(1.05);
            box-shadow: 0 20px 40px rgba(12, 145, 69, 0.5);
            background: linear-gradient(135deg, #0ea64f, var(--primary));
        }

        /* Animations */
        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        /* Responsive */
        @media (max-width: 640px) {
            h1 { font-size: 2.5rem; }
            .container { padding: 20px; }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="logo-wrapper">
            <span class="logo-icon">🌿</span>
            <h1>Brandsgarden</h1>
        </div>
        
        <p>Preparando la mejor experiencia de compra para ti. Mientras tanto, puedes explorar nuestra colección exclusiva.</p>

        <!-- Dynamic link directly to our WP migrated perfumes landing folder -->
        <a href="/perfumes/" class="btn-luxury">Ver Landings de Perfumes</a>
    </div>

</body>
</html>
