<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>¡Gracias por tu pedido! - Brandsgarden</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --green: #1A472A;
            --green-light: #e8f5e9;
            --text: #2d2d2d;
            --gray: #6b7280;
        }
        body {
            font-family: 'DM Sans', sans-serif;
            background-color: #f4f7f4;
            color: var(--text);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            text-align: center;
            padding: 20px;
        }
        .container {
            background: #fff;
            padding: 48px;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            max-width: 500px;
            width: 100%;
        }
        .icon {
            font-size: 64px;
            margin-bottom: 24px;
            display: inline-block;
        }
        h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 2rem;
            color: var(--green);
            margin-bottom: 16px;
        }
        p {
            line-height: 1.6;
            color: var(--gray);
            margin-bottom: 32px;
        }
        .btn {
            display: inline-block;
            background: var(--green);
            color: #fff;
            padding: 14px 32px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 700;
            transition: 0.3s;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(26, 71, 42, 0.2);
        }
    </style>
</head>
<body>
    <div class="container">
        <span class="icon">🌿</span>
        <h1>¡Gracias por tu compra!</h1>
        <p>Tu pedido ha sido recibido con éxito. En breve nos pondremos en contacto contigo vía WhatsApp o teléfono para coordinar la entrega de tus perfumes favoritos.</p>
        <a href="/perfumes/" class="btn">Volver a la tienda</a>
    </div>
</body>
</html>
