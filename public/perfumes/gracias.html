<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>¡Gracias por tu compra! | Brandsgarden</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #1A472A;
            --accent: #0C9145;
            --white: #ffffff;
        }
        body {
            font-family: 'DM Sans', sans-serif;
            background-color: #f8faf8;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
        }
        .card {
            background: white;
            padding: 50px;
            border-radius: 24px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.05);
            max-width: 500px;
            width: 100%;
        }
        .icon {
            font-size: 60px;
            margin-bottom: 20px;
            display: block;
        }
        h1 {
            font-family: 'Outfit', sans-serif;
            color: var(--primary);
            font-weight: 800;
            margin-bottom: 15px;
        }
        p {
            color: #6b7280;
            line-height: 1.6;
            margin-bottom: 30px;
        }
        .btn {
            display: inline-block;
            background: var(--primary);
            color: white;
            padding: 15px 35px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 700;
            transition: 0.3s;
        }
        .btn:hover { background: var(--accent); transform: translateY(-3px); }
    </style>
</head>
<body>
    <div class="card">
        <span class="icon">🌿</span>
        <h1>¡Gracias por tu compra!</h1>
        <p>Tu pedido ha sido recibido con éxito. En breve nos pondremos en contacto contigo vía WhatsApp o teléfono para coordinar la entrega de tus perfumes favoritos.</p>
        <a href="/perfumes/" class="btn">Volver a la tienda</a>
    </div>
</body>
</html>
