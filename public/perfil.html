<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sigue tu Pedido | Brandsgarden</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #1A472A;
            --accent: #0C9145;
            --bg: #f8faf8;
            --card: #ffffff;
            --text: #1f2937;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            padding: 40px 20px;
            min-height: 100vh;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
        }
        .logo {
            text-align: center;
            margin-bottom: 40px;
        }
        .logo h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 2rem;
            color: var(--primary);
            font-weight: 800;
        }
        .logo a { text-decoration: none; }
        .logo p { color: #6b7280; font-size: 0.9rem; margin-top: 5px; }
        
        .search-card {
            background: var(--card);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            margin-bottom: 30px;
        }
        .form-group { margin-bottom: 20px; }
        .form-label { display: block; font-weight: 600; margin-bottom: 8px; font-size: 0.95rem; }
        .form-control {
            width: 100%;
            padding: 14px 18px;
            border: 2px solid #e5e7eb;
            border-radius: 12px;
            font-size: 1rem;
            outline: none;
            transition: 0.2s;
        }
        .form-control:focus { border-color: var(--accent); box-shadow: 0 0 0 4px rgba(12, 145, 69, 0.1); }
        .btn {
            width: 100%;
            padding: 14px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.2s;
        }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(26, 71, 42, 0.2); }
        
        .order-card {
            background: white;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 15px;
            border-left: 5px solid var(--accent);
            box-shadow: 0 4px 6px rgba(0,0,0,0.02);
        }
        .order-header { display: flex; justify-content: space-between; margin-bottom: 10px; }
        .order-id { font-weight: 700; color: var(--primary); }
        .order-status {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 700;
            text-transform: uppercase;
        }
        .status-preparando { background: #fef3c7; color: #92400e; }
        .status-en-camino { background: #dbeafe; color: #1e40af; }
        .status-entregado { background: #d1fae5; color: #065f46; }
        
        .order-details { font-size: 0.9rem; color: #4b5563; }
        .order-total { text-align: right; font-weight: 800; font-size: 1.1rem; color: var(--accent); margin-top: 10px; }
        
        .back-link { text-align: center; margin-top: 40px; }
        .back-link a { color: var(--primary); text-decoration: none; font-weight: 600; font-size: 0.95rem; }
    </style>
</head>
<body>
<div class="container">
  <div class="logo">
    <a href="/perfumes/"><h1>🌿 Brandsgarden</h1></a>
    <p>Seguimiento de tus pedidos</p>
  </div>

  <div class="search-card">
    <h3 style="margin-bottom: 20px; font-family: 'Outfit', sans-serif;">Busca tu pedido</h3>
    <div class="form-group">
      <label class="form-label">Número de Celular / Teléfono</label>
      <input type="tel" id="tel-input" class="form-control" placeholder="987654321">
    </div>
    <button class="btn" onclick="buscarPedidos()">Consultar Pedidos →</button>
  </div>

  <div id="resultado"></div>

  <div class="back-link">
    <a href="/perfumes/">← Volver a la tienda</a>
  </div>
</div>

<script>
    // Autofill from URL if exists
    const urlParams = new URLSearchParams(window.location.search);
    const tel = urlParams.get('tel');
    if(tel) {
        document.getElementById('tel-input').value = tel;
        buscarPedidos();
    }

    async function buscarPedidos() {
        const tel = document.getElementById('tel-input').value.trim();
        const container = document.getElementById('resultado');
        if(!tel) return alert('Por favor ingresa tu número de teléfono');
        
        container.innerHTML = '<p style="text-align:center">Buscando...</p>';
        
        try {
            const res = await fetch(`/api/pedidos?telefono=${tel}`);
            const pedidos = await res.json();
            
            if(pedidos.length === 0) {
                container.innerHTML = '<div class="search-card" style="text-align:center; color:#ef4444">No encontramos pedidos asociados a este número.</div>';
                return;
            }
            
            container.innerHTML = `
                <h4 style="margin-bottom: 15px; font-family:'Outfit'">Hemos encontrado ${pedidos.length} pedido(s):</h4>
                ${pedidos.sort((a,b) => b.id - a.id).map(p => `
                    <div class="order-card">
                        <div class="order-header">
                            <span class="order-id">Pedido #${p.id}</span>
                            <span class="order-status status-${p.estado.toLowerCase().replace(/\s+/g, '-')}">${p.estado}</span>
                        </div>
                        <div class="order-details">
                            <p><strong>Fecha:</strong> ${p.fecha}</p>
                            <p><strong>Dirección:</strong> ${p.direccion}</p>
                            <p style="margin-top:5px"><strong>Productos:</strong> ${(p.productos || []).map(it => `${it.cantidad}x ${it.nombre}`).join(', ')}</p>
                        </div>
                        <div class="order-total">S/ ${(p.total || 0).toFixed(2)}</div>
                    </div>
                `).join('')}
            `;
        } catch(e) {
            container.innerHTML = '<p style="text-align:center; color:red">Error al conectar con el servidor.</p>';
        }
    }
</script>
</body>
</html>
