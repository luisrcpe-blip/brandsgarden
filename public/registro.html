<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brandsgarden - Registro e Inicio de Sesión</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'DM Sans', sans-serif;
            background-color: #f8fafc;
            color: #2D2D2D;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
            background: linear-gradient(135deg, #f8fafc 0%, #e8f5e9 100%);
        }
        .container {
            width: 100%;
            max-width: 450px;
            padding: 20px;
            perspective: 1000px;
        }
        .auth-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.3);
            text-align: center;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .logo {
            margin-bottom: 24px;
        }
        .logo img {
            width: 180px;
            height: auto;
        }
        h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 1.8rem;
            color: #1A472A;
            margin-bottom: 8px;
            font-weight: 800;
        }
        p.subtitle {
            color: #64748b;
            font-size: 0.95rem;
            margin-bottom: 32px;
        }
        .form-group {
            text-align: left;
            margin-bottom: 20px;
        }
        label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 8px;
            color: #475569;
        }
        input {
            width: 100%;
            padding: 14px 16px;
            border-radius: 12px;
            border: 2px solid #e2e8f0;
            font-family: inherit;
            font-size: 1rem;
            transition: all 0.2s;
            outline: none;
        }
        input:focus {
            border-color: #1A472A;
            box-shadow: 0 0 0 4px rgba(26, 71, 42, 0.1);
        }
        .btn-auth {
            width: 100%;
            padding: 16px;
            border-radius: 12px;
            border: none;
            background: linear-gradient(135deg, #0C9145 0%, #1A472A 100%);
            color: white;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 10px 15px rgba(12, 145, 69, 0.2);
            margin-top: 8px;
        }
        .btn-auth:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 20px rgba(12, 145, 69, 0.3);
        }
        .toggle-auth {
            margin-top: 24px;
            font-size: 0.9rem;
            color: #64748b;
        }
        .toggle-auth a {
            color: #0C9145;
            text-decoration: none;
            font-weight: 700;
        }
        .toggle-auth a:hover {
            text-decoration: underline;
        }
        .error-msg {
            background: #fef2f2;
            color: #dc2626;
            padding: 12px;
            border-radius: 8px;
            font-size: 0.85rem;
            margin-bottom: 20px;
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="auth-card">
            <div class="logo">
                <img src="/wp-content/uploads/2026/01/Logobrandsgarden.png" alt="Brandsgarden">
            </div>
            
            <div id="login-section">
                <h1>Bienvenido de nuevo</h1>
                <p class="subtitle">Accede a tu cuenta exclusiva</p>
                <div id="login-error" class="error-msg"></div>
                <form id="login-form">
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" id="login-email" placeholder="ejemplo@correo.com" required>
                    </div>
                    <div class="form-group">
                        <label>Contraseña</label>
                        <input type="password" id="login-password" placeholder="••••••••" required>
                    </div>
                    <button type="submit" class="btn-auth">Iniciar Sesión →</button>
                </form>
                <p class="toggle-auth">
                    ¿No tienes una cuenta? <a href="#" id="to-register">Regístrate</a>
                </p>
            </div>

            <div id="register-section" style="display: none;">
                <h1>Crea tu cuenta</h1>
                <p class="subtitle">Únete a la experiencia Brandsgarden</p>
                <div id="register-error" class="error-msg"></div>
                <form id="register-form">
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" id="register-email" placeholder="ejemplo@correo.com" required>
                    </div>
                    <div class="form-group">
                        <label>Contraseña</label>
                        <input type="password" id="register-password" placeholder="Crea una contraseña" required>
                    </div>
                    <button type="submit" class="btn-auth">Registrarse →</button>
                </form>
                <p class="toggle-auth">
                    ¿Ya tienes cuenta? <a href="#" id="to-login">Inicia Sesión</a>
                </p>
            </div>
        </div>
    </div>

    <script>
        const loginSection = document.getElementById('login-section');
        const registerSection = document.getElementById('register-section');
        const toRegister = document.getElementById('to-register');
        const toLogin = document.getElementById('to-login');

        toRegister.onclick = (e) => {
            e.preventDefault();
            loginSection.style.display = 'none';
            registerSection.style.display = 'block';
        };

        toLogin.onclick = (e) => {
            e.preventDefault();
            registerSection.style.display = 'none';
            loginSection.style.display = 'block';
        };

        // Login Handler
        document.getElementById('login-form').onsubmit = async (e) => {
            e.preventDefault();
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;
            const error = document.getElementById('login-error');
            
            try {
                const res = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const data = await res.json();
                if (data.ok) {
                    window.location.href = data.redirect;
                } else {
                    error.textContent = data.error;
                    error.style.display = 'block';
                }
            } catch (err) {
                error.textContent = 'Error de conexión';
                error.style.display = 'block';
            }
        };

        // Register Handler
        document.getElementById('register-form').onsubmit = async (e) => {
            e.preventDefault();
            const email = document.getElementById('register-email').value;
            const password = document.getElementById('register-password').value;
            const error = document.getElementById('register-error');
            
            try {
                const res = await fetch('/api/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const data = await res.json();
                if (data.ok) {
                    window.location.href = data.redirect;
                } else {
                    error.textContent = data.error;
                    error.style.display = 'block';
                }
            } catch (err) {
                error.textContent = 'Error de conexión';
                error.style.display = 'block';
            }
        };
    </script>
</body>
</html>
